<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Digital Business Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="card-container">
        <div class="glow-bg"></div>

        <div class="card-header">
            <div class="profile-wrapper">
                <img src="1779201113289.png" alt="Profile Picture" id="profile-pic">
                <div class="verified-badge"><i class="fas fa-check"></i></div>
            </div>
            <h1>Vinay Kumar</h1>
            <p class="designation">Premium Digital Creator & Consultant</p>
            <p class="bio">Helping businesses scale with modern digital solutions. Let's connect!</p>
        </div>

        <div class="action-buttons">
            <a href="tel:+917895252570" class="action-btn call"><i class="fas fa-phone-alt"></i> Call</a>
            <a href="https://wa.me/917895252570?text=Hi,%20I%20saw%20your%20Digital%20Card!" target="_blank" class="action-btn whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="mailto:your-email@example.com" class="action-btn email"><i class="fas fa-envelope"></i> Email</a>
        </div>

        <div class="social-grid">
            <a href="#" class="social-item"><i class="fab fa-instagram"></i><span>Instagram</span></a>
            <a href="#" class="social-item"><i class="fab fa-linkedin-in"></i><span>LinkedIn</span></a>
            <a href="#" class="social-item"><i class="fab fa-twitter"></i><span>Twitter</span></a>
            <a href="#" class="social-item"><i class="fas fa-globe"></i><span>Website</span></a>
        </div>

        <button class="vcard-btn" id="downloadVCard">
            <i class="fas fa-user-plus"></i> Save Contact to Phone
        </button>

        <div class="or-divider"><span>GET IN TOUCH</span></div>

        <div class="lead-form-section">
            <form action="https://formsubmit.co/vinaykhatrim@gmail.com" method="POST">
                <div class="input-group">
                    <input type="hidden" name="_next" value="https://vinay60789.github.io/My">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" placeholder="Your Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-comment-alt input-icon"></i>
                    <input type="text" name="message" placeholder="How can we help you?" required>
                </div>
                <button type="submit" class="submit-btn">Send Message <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>

        <div class="card-footer">
            <p>Created by <a href="#">YourAgency</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
